# Downstream exclusion is implicit: Others, Modalidades, Futsal,
# Desporto Adaptado, and Staff stay in raw/bronze only.

rate_limiting:
  max_retries: 3
  backoff_base_seconds: 1
  backoff_max_seconds: 60
  jitter: true

# -----------------------------------------------------------------------------
# Performance tunables for vald_midnight_full_refresh.
# Each value can be overridden by the corresponding environment variable.
# Defaults are tuned for the current ~5 tenant / ~12 target-group footprint.
# -----------------------------------------------------------------------------
performance:
  # Bronze extraction
  fd_trials_workers: 16        # VALD_FD_TRIALS_WORKERS — concurrent get_trials calls per tenant
  tenant_workers: 4            # VALD_TENANT_WORKERS    — concurrent tenants per module

  # Bronze raw->bronze replay
  replay_chunk_size: 5000      # VALD_REPLAY_CHUNK_SIZE        — keyset chunk
  replay_commit_batch_size: 5000  # VALD_REPLAY_COMMIT_BATCH_SIZE — rows per commit
  forceframe_trace_replay_chunk_size: 100  # VALD_FORCEFRAME_TRACE_REPLAY_CHUNK_SIZE - ForceFrame trace keyset chunk
  forceframe_trace_replay_commit_batch_size: 25  # VALD_FORCEFRAME_TRACE_REPLAY_COMMIT_BATCH_SIZE - ForceFrame trace rows per commit
  dynamo_trace_replay_chunk_size: 50  # VALD_DYNAMO_TRACE_REPLAY_CHUNK_SIZE - DynaMo trace keyset chunk
  dynamo_trace_replay_commit_batch_size: 25  # VALD_DYNAMO_TRACE_REPLAY_COMMIT_BATCH_SIZE - DynaMo trace rows per commit

  # Silver
  silver_fd_buckets: 8         # VALD_SILVER_FD_BUCKETS        — parallel hash shards for trial_results backfill
  silver_fd_group_workers: 4   # VALD_SILVER_FD_GROUP_WORKERS  — parallel target_group inserts

  # Gold
  gold_family_workers: 5       # VALD_GOLD_FAMILY_WORKERS      — parallel family publishers

  # PostgreSQL pool — bump to fit the new in-task fan-out.
  postgres_pool_max_connections: 32   # POSTGRES_POOL_MAX_CONNECTIONS
