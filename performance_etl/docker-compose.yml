x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-performance-hub-airflow}:${AIRFLOW_IMAGE_TAG:-local}
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/performance_hub/airflow/dags
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Europe/Lisbon
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_METADATA_SQL_ALCHEMY_CONN:-postgresql+psycopg2://${AIRFLOW_METADATA_POSTGRES_USER:-airflow}:${AIRFLOW_METADATA_POSTGRES_PASSWORD:-airflow}@airflow-metadata-db:5432/${AIRFLOW_METADATA_POSTGRES_DB:-airflow}}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-change-me}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    PYTHONPATH: /opt/airflow/performance_hub
    # Heartbeat / zombie detection tuning.
    # Task sends a heartbeat every 60s. With Docker DNS occasionally blipping
    # under load, consecutive failures can add up: 5s timeout × 5 attempts per
    # DNS query = up to 25s per failed heartbeat attempt. Setting the zombie
    # threshold to 900s (15 min) means the task must fail ~15 consecutive
    # heartbeats before being declared dead, giving enough headroom for
    # transient DNS failures on long-running Bronze/Silver tasks.
    AIRFLOW__JOBS__LOCAL_TASK_JOB_HEARTBEAT_SEC: "60"
    AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_THRESHOLD: "300"
    AIRFLOW__SCHEDULER__SCHEDULER_ZOMBIE_TASK_THRESHOLD: "900"
  dns_opt:
    - "ndots:1"       # reduces unnecessary DNS search-domain retries
    - "timeout:5"     # 5s per DNS attempt (Docker default is 2s)
    - "attempts:5"    # retry up to 5 times before failing
  init: true
  stop_grace_period: 30s
  volumes:
    - airflow_logs:/opt/airflow/logs
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  healthcheck:
    test: ["CMD-SHELL", "python -c \"import pathlib; pathlib.Path('/opt/airflow/performance_hub').exists() or (_ for _ in ()).throw(SystemExit(1))\""]
    interval: 30s
    timeout: 10s
    retries: 5
  restart: unless-stopped

services:
  airflow-metadata-db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${AIRFLOW_METADATA_POSTGRES_DB:-airflow}
      POSTGRES_USER: ${AIRFLOW_METADATA_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_METADATA_POSTGRES_PASSWORD:-airflow}
    volumes:
      - airflow_metadata_db:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -U ${AIRFLOW_METADATA_POSTGRES_USER:-airflow} -d ${AIRFLOW_METADATA_POSTGRES_DB:-airflow}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    depends_on:
      airflow-metadata-db:
        condition: service_healthy
    command:
      - bash
      - -lc
      - |
        set -e
        airflow db migrate
        if airflow users create \
          --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com
        then
          echo "Created Airflow admin user ${AIRFLOW_ADMIN_USERNAME:-admin}"
        else
          airflow users reset-password \
            --username "${AIRFLOW_ADMIN_USERNAME:-admin}" \
            --password "${AIRFLOW_ADMIN_PASSWORD:-admin}"
        fi
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-metadata-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-metadata-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command:
      - bash
      - -lc
      - |
        set -e
        airflow dags unpause vald_midnight_full_refresh
        airflow dags unpause vald_intraday_incremental
        airflow dags unpause vald_historical_day_reprocess
        exec airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  airflow_logs:
  airflow_metadata_db:
