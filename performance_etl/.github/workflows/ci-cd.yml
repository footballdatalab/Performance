name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Compile critical entrypoints
        run: |
          python -m py_compile ingestion/vald/pipeline.py
          python -m py_compile airflow/dags/vald_pipeline.py
          python -m py_compile script/run_vald_ingestion.py

      - name: Run focused unit tests
        run: |
          pytest \
            tests/unit/vald/test_cutoff.py \
            tests/unit/vald/test_reference_extractor.py \
            tests/unit/vald/test_raw_loader.py \
            tests/unit/vald/test_bronze_loader.py \
            tests/unit/vald/test_gold_etl.py \
            tests/unit/vald/test_pipeline.py \
            tests/unit/vald/test_raw_replay.py \
            tests/unit/test_clean_vald_tables.py \
            -q

      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          docker compose config > /dev/null

  docker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy CI env file
        run: cp .env.example .env

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/airflow
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
