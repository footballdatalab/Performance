provider: vald
auth:
  token_url_env: VALD_TOKEN_URL
  client_id_env: VALD_CLIENT_ID
  client_secret_env: VALD_CLIENT_SECRET
  audience: vald-api-external
  token_buffer_seconds: 60

region_env: VALD_REGION

regional_hosts:
  au:
    tenants: prd-aue-api-externaltenants.valdperformance.com
    profiles: prd-aue-api-externalprofile.valdperformance.com
    forcedecks: prd-aue-api-extforcedecks.valdperformance.com
    forceframe: prd-aue-api-externalforceframe.valdperformance.com
    nordbord: prd-aue-api-externalnordbord.valdperformance.com
    humantrak: prd-aue-api-externalhumantrakv2.valdperformance.com
    smartspeed: prd-aue-api-extsmartspeed.valdperformance.com
    dynamo: prd-aue-api-extdynamo.valdperformance.com
  us:
    tenants: prd-use-api-externaltenants.valdperformance.com
    profiles: prd-use-api-externalprofile.valdperformance.com
    forcedecks: prd-use-api-extforcedecks.valdperformance.com
    forceframe: prd-use-api-externalforceframe.valdperformance.com
    nordbord: prd-use-api-externalnordbord.valdperformance.com
    humantrak: prd-use-api-externalhumantrakv2.valdperformance.com
    smartspeed: prd-use-api-extsmartspeed.valdperformance.com
    dynamo: prd-use-api-extdynamo.valdperformance.com
  eu:
    tenants: prd-euw-api-externaltenants.valdperformance.com
    profiles: prd-euw-api-externalprofile.valdperformance.com
    forcedecks: prd-euw-api-extforcedecks.valdperformance.com
    forceframe: prd-euw-api-externalforceframe.valdperformance.com
    nordbord: prd-euw-api-externalnordbord.valdperformance.com
    humantrak: prd-euw-api-externalhumantrakv2.valdperformance.com
    smartspeed: prd-euw-api-extsmartspeed.valdperformance.com
    dynamo: prd-euw-api-extdynamo.valdperformance.com

modules:
  - name: forcedecks
    enabled: true
    sync_strategy: watermark
    watermark_param: modifiedFromUtc
    watermark_response_field: modifiedDateUtc
    termination_signal: status_204

  - name: forceframe
    enabled: true
    sync_strategy: watermark
    watermark_param: modifiedFromUtc
    watermark_response_field: modifiedDateUtc
    termination_signal: status_204

  - name: nordbord
    enabled: true
    sync_strategy: watermark
    watermark_param: modifiedFromUtc
    watermark_response_field: modifiedDateUtc
    termination_signal: status_204

  - name: smartspeed
    enabled: true
    sync_strategy: page_watermark
    watermark_param: modifiedFromUtc
    watermark_source: request_timestamp
    termination_signal: empty_array
    page_param: page

  - name: dynamo
    enabled: true
    sync_strategy: page_watermark
    watermark_param: modifiedFromUtc
    watermark_source: request_timestamp
    termination_signal: page_exhausted
    page_param: page

